version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/webapp"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    ignore:
      # Tailwind v4 is a major migration (config rewrite, new @tailwindcss/postcss
      # plugin, @import syntax). Pin to v3 until the migration is done manually.
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
      preact:
        patterns:
          - "preact"
          - "@preact/*"

  - package-ecosystem: "pip"
    directory: "/scripts"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
