name: Validate Data

on:
  pull_request:
    paths:
      - 'data/**'
      - 'schemas/**'
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'schemas/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Validate data against schemas
        run: python scripts/validate_data.py

      - name: Check for duplicate IDs
        run: |
          python -c "
          import json
          with open('data/literature.json') as f:
              data = json.load(f)
          ids = [e['id'] for e in data['entries']]
          dupes = [x for x in ids if ids.count(x) > 1]
          if dupes:
              print(f'Duplicate IDs found: {set(dupes)}')
              exit(1)
          print(f'All {len(ids)} IDs are unique')
          "

      - name: Validate category references
        run: |
          python -c "
          import json
          with open('data/taxonomy.json') as f:
              tax = json.load(f)
          valid_cats = set()
          for domain in tax['domains']:
              for cat in domain['categories']:
                  valid_cats.add(cat['id'])
          with open('data/literature.json') as f:
              lit = json.load(f)
          invalid = []
          for entry in lit['entries']:
              for cat in entry.get('categories', []):
                  if cat not in valid_cats:
                      invalid.append((entry['id'], cat))
          if invalid:
              for eid, cat in invalid:
                  print(f'Invalid category \"{cat}\" in entry {eid}')
              exit(1)
          print(f'All category references are valid ({len(valid_cats)} categories)')
          "
