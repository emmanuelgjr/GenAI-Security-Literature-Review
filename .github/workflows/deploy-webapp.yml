name: Deploy Webapp

on:
  push:
    branches: [main]
    paths:
      - 'webapp/**'
      - 'data/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: webapp
        run: npm install

      - name: Copy data files
        run: |
          mkdir -p webapp/src/data
          cp data/literature.json webapp/src/data/
          cp data/taxonomy.json webapp/src/data/
          cp data/frameworks.json webapp/src/data/

      - name: Build
        working-directory: webapp
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webapp/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
