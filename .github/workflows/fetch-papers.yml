name: Fetch New Papers

on:
  schedule:
    # Run every Sunday at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch from arXiv
        run: python scripts/fetch_arxiv.py
        continue-on-error: true

      - name: Fetch from Semantic Scholar
        run: python scripts/fetch_semantic_scholar.py
        continue-on-error: true

      - name: Fetch from CrossRef
        run: python scripts/fetch_crossref.py
        continue-on-error: true

      - name: Deduplicate and merge
        id: dedup
        run: |
          python scripts/deduplicate.py | tee dedup_output.txt
          # Check if new entries were added
          if grep -q "No new entries to add" dedup_output.txt; then
            echo "has_new=false" >> $GITHUB_OUTPUT
          else
            echo "has_new=true" >> $GITHUB_OUTPUT
            # Extract the summary for PR body
            sed -n '/--- New Entries ---/,$p' dedup_output.txt > new_entries_summary.txt
          fi

      - name: Validate data
        if: steps.dedup.outputs.has_new == 'true'
        run: python scripts/validate_data.py

      - name: Create Pull Request
        if: steps.dedup.outputs.has_new == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/papers-${{ github.run_number }}
          commit-message: "auto: add new papers from weekly fetch"
          title: "Auto: New LLM Security Papers (Week of ${{ github.event.schedule && 'scheduled' || 'manual' }} run)"
          body: |
            ## Automated Paper Fetch

            New papers discovered from arXiv, Semantic Scholar, and CrossRef.

            **All entries are marked `reviewed: false`** -- please review before merging.

            ### New Entries

            ```
            ${{ steps.dedup.outputs.has_new == 'true' && '(see commit diff for details)' || 'None' }}
            ```

            ---
            *This PR was automatically generated by the weekly paper fetch workflow.*
          labels: auto-fetch,new-resource
          assignees: emmanuelgjr

      - name: Clean up candidate files
        if: always()
        run: rm -f scripts/candidates_*.json dedup_output.txt new_entries_summary.txt
